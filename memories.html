<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 182, 193, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(135, 206, 250, 0.3) 0%, transparent 50%);
            pointer-events: none;
        }

        .gallery-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 700px;
            position: relative;
            background: #ffffff;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border-radius: 20px;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%);
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            color: white;
            font-size: 1.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            z-index: 10;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .slides-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(1.05);
        }

        .slide.active {
            opacity: 1;
            transform: scale(1);
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slide::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0.3) 0%, 
                transparent 30%, 
                transparent 70%, 
                rgba(0,0,0,0.3) 100%);
            pointer-events: none;
        }

        .heart-decoration {
            position: absolute;
            font-size: 2rem;
            color: rgba(255, 107, 107, 0.6);
            animation: float 3s ease-in-out infinite;
            z-index: 15;
        }

        .heart-1 { top: 15%; left: 10%; animation-delay: 0s; }
        .heart-2 { top: 25%; right: 15%; animation-delay: 0.5s; }
        .heart-3 { bottom: 30%; left: 15%; animation-delay: 1s; }
        .heart-4 { bottom: 20%; right: 10%; animation-delay: 1.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-20px) rotate(10deg); opacity: 1; }
        }

        .progress-bar {
            position: absolute;
            top: 70px;
            left: 20px;
            right: 20px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            z-index: 15;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: white;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .dots-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 15;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .dot.active {
            background: white;
            transform: scale(1.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.5rem;
            color: white;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            z-index: 15;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-arrow:hover {
            background: rgba(0, 0, 0, 0.4);
            transform: translateY(-50%) scale(1.1);
        }

        .nav-arrow.prev {
            left: 20px;
        }

        .nav-arrow.next {
            right: 20px;
        }

        @media (max-width: 480px) {
            .gallery-container {
                max-height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }

            .nav-arrow {
                width: 50px;
                height: 50px;
                font-size: 2rem;
            }

            .nav-arrow.prev { left: 10px; }
            .nav-arrow.next { right: 10px; }

            .dots-container {
                bottom: 30px;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .heart-decoration {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <div class="header">
            <h1>Our Memories 💕</h1>
            <a href="letter.html" class="back-btn">← Back</a>
        </div>
        
        <div class="heart-decoration heart-1">❤️</div>
        <div class="heart-decoration heart-2">💕</div>
        <div class="heart-decoration heart-3">💗</div>
        <div class="heart-decoration heart-4">💖</div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        
        <div class="slides-container">
            <!-- <div class="slide active">
                <img src="IMG/img1.jpg" alt="Memory 1" onerror="this.src='IMG/img1.JPG'">
            </div> -->
            <div class="slide">
                <img src="IMG/img2.jpg" alt="Memory 2" onerror="this.src='IMG/img2.JPG'">
            </div>
            <div class="slide">
                <img src="IMG/img3.jpg" alt="Memory 3" onerror="this.src='IMG/img3.JPG'">
            </div>
            <div class="slide">
                <img src="IMG/img4.jpg" alt="Memory 4" onerror="this.src='IMG/img4.JPG'">
            </div>
            <div class="slide">
                <img src="IMG/img5.jpg" alt="Memory 5" onerror="this.src='IMG/img5.JPG'">
            </div>
        </div>

        <button class="nav-arrow prev">❮</button>
        <button class="nav-arrow next">❯</button>

        <div class="dots-container">
            <div class="dot active" data-index="0"></div>
            <div class="dot" data-index="1"></div>
            <div class="dot" data-index="2"></div>
            <div class="dot" data-index="3"></div>
            <div class="dot" data-index="4"></div>
        </div>
    </div>

    <audio id="reel-audio">
        <source src="reel.mp3" type="audio/mpeg">
    </audio>

    <script>
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        const prevBtn = document.querySelector('.prev');
        const nextBtn = document.querySelector('.next');
        const audio = document.getElementById('reel-audio');
        const progressFill = document.getElementById('progress-fill');
        
        let currentSlide = 0;
        const totalSlides = slides.length;
        let touchStartX = 0;
        let touchEndX = 0;

        // Play audio on page load
        audio.play().catch(e => console.log('Audio autoplay prevented'));

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.remove('active');
                dots[i].classList.remove('active');
            });
            
            slides[index].classList.add('active');
            dots[index].classList.add('active');
            currentSlide = index;
            
            // Update progress bar
            const progress = ((index + 1) / totalSlides) * 100;
            progressFill.style.width = progress + '%';
        }

        function nextSlide() {
            const next = (currentSlide + 1) % totalSlides;
            showSlide(next);
        }

        function prevSlide() {
            const prev = (currentSlide - 1 + totalSlides) % totalSlides;
            showSlide(prev);
        }

        nextBtn.addEventListener('click', nextSlide);
        prevBtn.addEventListener('click', prevSlide);

        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => showSlide(index));
        });

        // Touch events for swipe
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;

            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    nextSlide();
                } else {
                    prevSlide();
                }
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            }
        });

        // Initialize progress bar
        showSlide(0);
    </script>
</body>
</html>
